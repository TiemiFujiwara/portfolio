<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site em desenvolvimento</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #eee;
      text-align: center;
      padding: 24px;
    }

    .box { max-width: 540px; }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #b8b8c8;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-top: 28px;
      border-radius: 50%;
      background: #4cd137;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🚧 Site em desenvolvimento</h1>
    <p>Estamos construindo algo novo por aqui. Volte em breve!</p>
    <div class="dot"></div>
  </div>
</body>

</html>
